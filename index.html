  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv>\n\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:18px\">\n          <div style=\"display:flex;align-items:center;gap:13px;padding-bottom:15px;margin-bottom:15px;border-bottom:1px solid var(--line-soft)\">\n            <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13.5px\">Agendar automaticamente<\u002Fdiv><div style=\"font-size:12px;color:var(--ink-soft);margin-top:2px\">A IA cria o agendamento quando o cliente confirma dia e horário.<\u002Fdiv><\u002Fdiv>\n            <button onclick=\"{{ toggleAiSchedule }}\" style=\"{{ aiSchedToggleStyle }}\"><span style=\"{{ aiSchedKnobStyle }}\"><\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n          <label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px\">Dias de funcionamento<\u002Flabel>\n          <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:15px\">\n            <sc-for list=\"{{ workDayChips }}\" as=\"d\" hint-placeholder-count=\"7\"><button onclick=\"{{ d.onClick }}\" style=\"{{ d.style }}\">{{ d.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n            <div style=\"flex:1;min-width:130px\">\n              <label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Abertura<\u002Flabel>\n              <select value=\"{{ workStart }}\" onchange=\"{{ onWorkStart }}\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface);font-family:var(--mono);font-weight:600;cursor:pointer\" style-focus=\"outline:none;border-color:var(--primary)\"><sc-for list=\"{{ startOpts }}\" as=\"t\" hint-placeholder-count=\"6\"><option value=\"{{ t.v }}\">{{ t.v }}<\u002Foption><\u002Fsc-for><\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:130px\">\n              <label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Fechamento<\u002Flabel>\n              <select value=\"{{ workEnd }}\" onchange=\"{{ onWorkEnd }}\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface);font-family:var(--mono);font-weight:600;cursor:pointer\" style-focus=\"outline:none;border-color:var(--primary)\"><sc-for list=\"{{ endOpts }}\" as=\"t\" hint-placeholder-count=\"6\"><option value=\"{{ t.v }}\">{{ t.v }}<\u002Foption><\u002Fsc-for><\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:13px;padding:10px 12px;background:var(--surface-2);border-radius:10px\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg>A IA atende e agenda dentro de <b>{{ workSummary }}<\u002Fb> — e nunca em horários já ocupados na Agenda.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:18px\">\n          <h3 style=\"font-size:14px;font-weight:700;margin-bottom:3px\">Instruções personalizadas<\u002Fh3>\n          <p style=\"font-size:12.5px;color:var(--ink-soft);margin-bottom:12px\">Regras e informações que a IA deve seguir (descontos, adicionais, observações).<\u002Fp>\n          <textarea value=\"{{ agInstrucoes }}\" oninput=\"{{ onAgInstr }}\" rows=\"4\" placeholder=\"Ex.: Ofereça impermeabilização como adicional. Não dê desconto acima de 10%.\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;resize:vertical;min-height:96px;line-height:1.5;background:var(--surface-2);font-size:13.5px\" style-focus=\"outline:none;border-color:var(--primary);background:var(--surface)\"><\u002Ftextarea>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:flex-start;gap:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:15px 17px\">\n          <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"var(--ink-faint)\" stroke-width=\"2\" style=\"flex-shrink:0;margin-top:1px\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-size:12.5px;color:var(--ink-soft);line-height:1.6\">A IA usa a <b>tabela de preços<\u002Fb> do <b>Orçamento<\u002Fb> e os <b>Modelos de mensagem<\u002Fb> como base. As alterações aqui valem para o atendimento automático e para o botão <b>Sugerir resposta<\u002Fb> nas conversas.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== AGENDA ===== -->\n    <sc-if value=\"{{ isAgenda }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"flex:1;overflow-y:auto;min-height:0\">\n      <div style=\"max-width:860px;margin:0 auto;padding:24px 22px 60px\">\n        <div style=\"display:flex;align-items:center;gap:11px\">\n          <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.02em\">Agenda de serviços<\u002Fh2>\n          <span style=\"font-family:var(--mono);font-size:12px;font-weight:700;color:var(--primary,#BC5A39);background:var(--primary-soft);padding:3px 10px;border-radius:20px\">{{ agendaCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--ink-soft);font-size:13.5px;margin:3px 0 20px;font-weight:500\">Agendamentos feitos por você e pela 🤖 IA Atendente — direto das conversas.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start\">\n          <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)\">\n            <div style=\"display:flex;align-items:center;margin-bottom:13px\">\n              <span style=\"flex:1;font-weight:800;font-size:15px;text-transform:capitalize\">{{ agMonthLabel }}<\u002Fspan>\n              <button onclick=\"{{ agCalPrev }}\" title=\"Mês anterior\" style=\"width:30px;height:30px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-soft);cursor:pointer;margin-right:6px\" style-hover=\"border-color:var(--primary);color:var(--ink)\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n              <button onclick=\"{{ agCalNext }}\" title=\"Próximo mês\" style=\"width:30px;height:30px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-soft);cursor:pointer\" style-hover=\"border-color:var(--primary);color:var(--ink)\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px\">\n              <div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">DOM<\u002Fdiv><div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">SEG<\u002Fdiv><div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">TER<\u002Fdiv><div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">QUA<\u002Fdiv><div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">QUI<\u002Fdiv><div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">SEX<\u002Fdiv><div style=\"text-align:center;font-size:10px;font-weight:700;color:var(--ink-faint)\">SÁB<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px\">\n              <sc-for list=\"{{ agCalDays }}\" as=\"d\" hint-placeholder-count=\"35\"><button onclick=\"{{ d.onClick }}\" style=\"{{ d.style }}\"><span>{{ d.label }}<\u002Fspan><sc-if value=\"{{ d.hasDots }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"{{ d.dotStyle }}\"><\u002Fspan><\u002Fsc-if><\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04);min-height:320px;overflow:hidden\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)\">\n              <div style=\"flex:1;min-width:0\"><div style=\"font-weight:800;font-size:16px;text-transform:capitalize\">{{ agDayLabel }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:1px\">{{ agDaySummary }}<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ openApptDay }}\" style=\"display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;background:var(--primary,#BC5A39);color:#fff;font-weight:700;font-size:13px;flex-shrink:0\" style-hover=\"background:var(--primary-d)\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Novo agendamento<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px\">\n              <sc-for list=\"{{ agDayItems }}\" as=\"a\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:15px;border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:9px\">\n                  <div style=\"text-align:center;flex-shrink:0;width:58px;padding-right:15px;border-right:1px solid var(--line-soft)\">\n                    <div style=\"font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:-.02em\">{{ a.time }}<\u002Fdiv>\n                    <div style=\"font-size:10.5px;color:var(--ink-faint);font-weight:600;margin-top:2px\">{{ a.durLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ a.onEdit }}\" style=\"flex:1;min-width:0;cursor:pointer\">\n                    <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-weight:700;font-size:14px\">{{ a.nome }}<\u002Fspan><sc-if value=\"{{ a.viaIa }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--primary-soft);color:var(--primary-d)\">🤖 IA<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:2px\">{{ a.servico }}<\u002Fdiv>\n                    <sc-if value=\"{{ a.hasObs }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:11.5px;color:var(--ink-soft);font-weight:500;margin-top:5px;display:flex;align-items:flex-start;gap:5px\"><svg viewBox=\"0 0 24 24\" width=\"12\" height=\"12\" fill=\"none\" stroke=\"var(--ink-faint)\" stroke-width=\"2\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M21 11.5a8.4 8.4 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.2A8.5 8.5 0 0 1 12 3a8.4 8.4 0 0 1 9 8.5z\"><\u002Fpath><\u002Fsvg>{{ a.obs }}<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <span style=\"{{ a.statusStyle }}\">{{ a.statusLabel }}<\u002Fspan>\n                  <div style=\"display:flex;gap:6px;flex-shrink:0\">\n                    <sc-if value=\"{{ a.isPending }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ a.onConfirm }}\" title=\"Confirmar\" style=\"width:32px;height:32px;border-radius:9px;background:var(--success-soft);color:var(--success);display:grid;place-items:center\" style-hover=\"filter:brightness(.97)\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n                    <button onclick=\"{{ a.onEdit }}\" title=\"Editar / comentar\" style=\"width:32px;height:32px;border-radius:9px;background:var(--surface-3);color:var(--ink-soft);display:grid;place-items:center\" style-hover=\"background:var(--line);color:var(--ink)\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <button onclick=\"{{ a.onRemove }}\" title=\"Remover\" style=\"width:32px;height:32px;border-radius:9px;background:var(--surface-3);color:var(--ink-faint);display:grid;place-items:center\" style-hover=\"background:var(--danger-soft);color:var(--danger)\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ agDayEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"text-align:center;padding:46px 20px;color:var(--ink-faint)\"><svg viewBox=\"0 0 24 24\" width=\"40\" height=\"40\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"opacity:.5;margin-bottom:12px\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg><p style=\"font-weight:600;font-size:14px;color:var(--ink-soft)\">Nenhum agendamento para este dia.<\u002Fp><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          < llow-up pendente.<\u002Fp><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== PAINEL ===== -->\n    <sc-if value=\"{{ isPainel }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"flex:1;overflow-y:auto;min-height:0\">\n      <div style=\"max-width:1000px;margin:0 auto;padding:24px 22px 60px\">\n        <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.02em\">Painel comercial<\u002Fh2>\n        <p style=\"color:var(--ink-soft);font-size:13.5px;margin:3px 0 22px;font-weight:500\">A saúde do seu funil em números.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(172px,1fr));gap:13px;margin-bottom:24px\">\n          <sc-for list=\"{{ metrics }}\" as=\"mt\" hint-placeholder-count=\"5\">\n            <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(23,35,31,.04)\">\n              <div style=\"font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em\">{{ mt.label }}<\u002Fdiv>\n              <div style=\"font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.02em;margin-top:9px;line-height:1;{{ mt.valStyle }}\">{{ mt.val }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-weight:600\">{{ mt.note }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(23,35,31,.04);margin-bottom:18px\">\n          <h3 style=\"font-size:14px;font-weight:700;margin-bottom:16px\">Funil de vendas<\u002Fh3>\n          <sc-for list=\"{{ funnelRows }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:11px\">\n              <div style=\"width:128px;font-size:12.5px 1px 2px rgba(23,35,31,.04)\">\n            <h3 style=\"font-size:14px;font-weight:700;margin-bottom:16px\">Serviços mais pedidos<\u002Fh3>\n            <sc-for list=\"{{ svcRows }}\" as=\"s\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:11px\"><div style=\"flex:1;font-size:12.5px;font-weight:600\">{{ s.name }}<\u002Fdiv><div style=\"width:110px;height:9px;background:var(--surface-3);border-radius:20px;overflow:hidden\"><div style=\"height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),#E29A6F);width:{{ s.width }}\"><\u002Fdiv><\u002Fdiv><div style=\"font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-soft);width:26px;text-align:right\">{{ s.count }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== ORCAMENTO ===== -->\n    <sc-if value=\"{{ isOrcamento }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"flex:1;overflow-y:auto;min-height:0\">\n      <div style=\"max-width:920px;margin:0 auto;padding:24px 22px 60px\">\n        <h2 style=\"font-size:21px;font-weight:800;letter-spacing:-.02em\">Orçamento rápido<\u002Fh2>\n        <p style=\"color:var(--ink-soft);font-size:13.5px;margin:3px 0 22px;font-weight:500\">Defina os preços uma vez. Monte um orçamento em segundos e envie pronto na conversa.<\u002Fp>\n        <sc-if value=\"{{ quoteForName }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;align-items:center;gap:8px;background:var(--primary-soft);border:1px solid #BEE3D5;color:var(--primary-d);font-weight:700;font-size:13px;padding:10px 14px;border-radius:11px;margin-bottom:16px\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1\"><\u002Fpath><\u002F ft);margin-bottom:14px\">Status da integração com o WhatsApp Business (Cloud API) via backend.<\u002Fp>\n          <sc-if value=\"{{ waConnected }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:12px;background:var(--success-soft);border:1px solid rgba(111,114,86,.3);border-radius:12px;padding:13px 15px\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:var(--wa);box-shadow:0 0 0 3px rgba(37,166,91,.18);flex-shrink:0\"><\u002Fspan>\n              <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13px;color:var(--success)\">Conectado · sincronizando<\u002Fdiv><div style=\"font-size:12px;color:var(--ink-soft);font-weight:600\">Recebendo e enviando mensagens pelo backend.<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ toggleWaBackend }}\" style=\"padding:8px 13px;border-radius:9px;background:var(--surface);border:1px solid var(--line);font-weight:700;font-size:12px;color:var(--ink-soft)\" style-hover=\"border-color:var(--danger);color:var(--danger)\">Desativar<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ waDisconnected }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:12px;background:var(--warn-soft);border:1px solid rgba(203,138,79,.3);border-radius:12px;padding:13px 15px\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:var(--warn);flex-shrink:0\"><\u002Fspan>\n              <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13px;color:var(--warn)\">Não conectado<\u002Fdiv><div style=\"font-size:12px;color:var(--ink-soft);font-weight:600\">Ative a sincronização para receber as mensagens.<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ toggleWaBackend }}\" style=\"padding:8px 13px;border-radius:9px;background:var(--wa);color:#fff;font-weight:700;font-size:12px\" style-hover=\"filter:brightness(.95)\">Ativar<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"font-size:11.5px;color:var(--ink-faint);margin-top:12px;line-height:1.5\">Configure as chaves do WhatsApp Cloud API e do Supabase no backend (veja o README) para as mensagens reais entrarem aqui.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ goAgente }}\" style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:18px\" style-hover=\"border-color:var(--primary)\">\n          <div style=\"width:34px;height:34px;border-radius:10px;background:var(--primary-soft);display:grid;place-items:center;flex-shrink:0;color:var(--primary,#E0712B)\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"4\" y=\"8\" width=\"16\" height=\"11\" rx=\"3\"><\u002Frect><path d=\"M12 8V4M9 13h.01M15 13h.01M2 13v3M22 13v3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"flex:1;min-width:0\"><h3 style=\"font-size:14px;font-weight:700\">Agente de IA<\u002Fh3><p style=\"font-size:12.5px;color:var(--ink-soft);margin-top:2px\">Tom, agendamento automático, horário e instruções — na aba <b>Agente IA<\u002Fb>.<\u002Fp><\u002Fdiv>\n          <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"var(--ink-faint)\" stroke-width=\"2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:18px\">\n          <h3 style=\"font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px\"><svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"var(--primary,#E0712B)\" stroke-width=\"2\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><circle cx=\"5\" cy=\"12\" r=\"1.6\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg>Backend &amp; Integrações<\u002Fh3>\n          <p style=\"font-size:12.5px;color:var(--ink-soft);margin-bottom:14px\">Conecte ao seu backend na Vercel para a <b>IA real<\u002Fb> e o <b>WhatsApp ao vivo<\u002Fb>. Deixe em branco se o CRM estiver hospedado junto com o backend (mesmo domínio).<\u002Fp>\n          <label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Endereço do backend (API)<\u002Flabel>\n          <div style=\"display:flex;gap:9px;margin-bottom:16px\">\n            <input id=\"setApi\" value=\"{{ apiBase }}\" placeholder=\"https://seu-crm.vercel.app\" style=\"flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface);font-family:var(--mono);font-size:12.5px\" style-focus=\"outline:none;border-color:var(--primary)\">\n            <button onclick=\"{{ saveApiBase }}\" style=\"padding:8px 14px;border-radius:9px;background:var(--primary,#E0712B);color:#fff;font-weight:700;font-size:12.5px;flex-shrink:0\" style-hover=\"background:var(--primary-d)\">Salvar<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:13px;padding-top:14px;border-top:1px solid var(--line-soft)\">\n            <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13px\">Sincronizar WhatsApp pelo backend<\u002Fdiv><div style=\"font-size:12px;color:var(--ink-soft);margin-top:2px\">Recebe e envia mensagens reais via WhatsApp Cloud API.<\u002Fdiv><\u002Fdiv>\n            <button onclick=\"{{ toggleWaBackend }}\" style=\"{{ waBackToggleStyle }}\"><span style=\"{{ waBackKnobStyle }}\"><\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(23,35,31,.04);margin-bottom:18px\">\n          <h3 style=\"font-size:14px;font-weight:700;margin-bottom:4px\">Follow-up automático<\u002Fh3>\n          <p style=\"font-size:12.5px;color:var(--ink-soft);margin-bottom:14px\">Em quantos dias cada etapa dispara um follow-up ao mover um lead.<\u002Fp>\n          <sc-for list=\"{{ stageFuRows }}\" as=\"sf\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-soft)\">\n              <span style=\"width:9px;height:9px;border-radius:3px;{{ sf.dotBg }}\"><\u002Fspan>\n              <span style=\"flex:1;font-weight:600;font-size:13px\">{{ sf.label }}<\u002Fspan>\n              <span style=\"font-size:12px;color:var(--ink-soft)\">follow-up em<\u002Fspan>\n              <input type=\"number\" min=\"0\" max=\"30\" value=\"{{ sf.days }}\" onchange=\"{{ sf.onChange }}\" style=\"width:64px;border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-family:var(--mono);font-weight:700;text-align:center;background:var(--surface-2);color:var(--ink)\" style-focus=\"outline:none;border-color:var(--primary);background:var(--surface)\">\n              <span style=\"font-size:12px;color:var(--ink-soft)\">dia(s)<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n  <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- ============ NOTIFICAÇÕES ============ -->\n  <sc-if value=\"{{ notifOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <div onclick=\"{{ closeNotif }}\" style=\"position:fixed;inset:0;z-index:90\"><\u002Fdiv>\n  <div style=\"position:fixed;top:64px;left:14px;width:316px;max-height:72vh;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 44px rgba(0,0,0,.32);z-index:91;animation:fadeup .18s\">\n    <div style=\"display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2\"><path d=\"M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.7 21a2 2 0 0 1-3.4 0\"><\u002Fpath><\u002Fsvg><h3 style=\"font-size:14px;font-weight:700;flex:1\">Notificações<\u002Fh3><span style=\"font-family:var(--mono);font-size:11px;font-weight:700;color:var(--primary,#BC5A39);background:var(--primary-soft);padding:2px 8px;border-radius:20px\">{{ notifCount }}<\u002Fspan><\u002Fdiv>\n    <sc-for list=\"{{ notifs }}\" as=\"n\" hint-placeholder-count=\"4\">\n      <button onclick=\"{{ n.onClick }}\" style=\"display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;padding:12px 16px;border-bottom:1px solid var(--line-soft);background:none;cursor:pointer\" style-hover=\"background:var(--surface-2)\">\n        <span style=\"{{ n.dotStyle }}\"><\u002Fspan>\n        <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ n.title }}<\u002Fdiv><div style=\"font-size:12px;color:var(--ink-soft);font-weight:500;margin-top:1px\">{{ n.sub }}<\u002Fdiv><\u002Fdiv>\n        <span style=\"font-size:10.5px;color:var(--ink-faint);font-weight:600;flex-shrink:0\">{{ n.timeLabel }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n    <sc-if value=\"{{ notifEmpty }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"text-align:center;padding:34px 16px;color:var(--ink-faint);font-size:13px;font-weight:600\">Tudo em dia! Sem notificações.<\u002Fdiv><\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ LEAD MODAL ============ -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <div onclick=\"{{ onScrim }}\" style=\"position:fixed;inset:0;background:rgba(15,30,26,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto\">\n    <div onclick=\"{{ stop }}\" style=\"background:var(--surface);border-radius:20px;width:100%;max-width:580px;box-shadow:0 24px 60px rgba(15,30,26,.3);overflow:hidden;animation:pop .22s cubic-bezier(.2,.9,.3,1)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)\">\n        <h3 style=\"font-size:16px;font-weight:800\">{{ modalTitle }}<\u002Fh3>\n        <button onclick=\"{{ closeModal }}\" style=\"width:34px;height:34px;border-radius:10px;background:var(--surface-3);display:grid;place-items:center\" style-hover=\"background:var(--line)\"><svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:20px 22px;max-height:66vh;overflow-y:auto\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\">\n          <div><label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Nome / cliente<\u002Flabel><input id=\"f_nome\" defaultvalue=\"{{ draft.nome }}\" placeholder=\"Nome do cliente\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface)\" style-focus=\"outline:none;border-color:var(--accent)\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">WhatsApp<\u002Flabel><input id=\"f_tel\" defaultvalue=\"{{ draft.tel }}\" placeholder=\"34 99999-9999\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface)\" style-focus=\"outline:none;border-color:var(--accent)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\">\n          <div><label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Origem<\u002Flabel><select id=\"f_origem\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface)\"><sc-for list=\"{{ originOptions }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o.value }}\" selected=\"{{ o.sel }}\">{{ o.value }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n          <div><label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Bairro / região<\u002Flabel><input id=\"f_bairro\" defaultvalue=\"{{ draft.bairro }}\" placeholder=\"Bairro\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface)\" style-focus=\"outline:none;border-color:var(--accent)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:14px\">\n          <label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px\">Serviços<\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px\">\n            <sc-for list=\"{{ svcChips }}\" as=\"c\" hint-placeholder-count=\"8\"><button onclick=\"{{ c.onClick }}\" style=\"padding:6px 12px;border-radius:20px;border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--surface)\" style-hover=\"border-color:var(--accent)\">{{ c.label }}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <input id=\"f_svc\" defaultvalue=\"{{ draft.svc }}\" placeholder=\"Detalhe: ex. Sofá 3 lugares, Colchão casal\" style=\"width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface)\" style-focus=\"outline:none;border-color:var(--accent)\">\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px\">\n          <div><label style=\"display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px
